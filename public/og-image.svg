<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="orbA" cx="20%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orbB" cx="85%" cy="80%" r="40%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="#080808"/>
  <rect width="1200" height="630" fill="url(#orbA)"/>
  <rect width="1200" height="630" fill="url(#orbB)"/>

  <!-- Logo mark -->
  <rect x="540" y="120" width="120" height="120" rx="26" ry="26" fill="#f0f0f0"/>
  <text x="600" y="218"
        font-family="'Cormorant Garamond', Georgia, serif"
        font-style="italic" font-weight="500" font-size="84"
        fill="#080808" text-anchor="middle" letter-spacing="-2">a.</text>

  <!-- Title -->
  <text x="600" y="360"
        font-family="'Cormorant Garamond', Georgia, serif"
        font-weight="300" font-size="86"
        fill="#f0f0f0" text-anchor="middle" letter-spacing="-2">
    Forms that know
  </text>
  <text x="600" y="448"
        font-family="'Cormorant Garamond', Georgia, serif"
        font-style="italic" font-weight="300" font-size="86"
        fill="#f0f0f0" text-anchor="middle" letter-spacing="-2">
    who you are.
  </text>

  <!-- Subtitle -->
  <text x="600" y="520"
